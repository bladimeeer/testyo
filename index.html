<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>.</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e0, #ffeef3);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hidden { display: none; }

.screen { text-align: center; }

.card {
    background: white;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(255, 105, 135, 0.25);
}

.card input {
    padding: 10px;
    width: 80%;
    border-radius: 10px;
    border: 1px solid pink;
    outline: none;
}

.card button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #ff6b81;
    color: white;
    cursor: pointer;
}

.phone {
    display: none;
    width: 380px;
    height: 650px;
    background: #fff0f5;
    border-radius: 20px;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(255, 105, 135, 0.25);
    overflow: hidden;
}

.phone.show { display: flex; }

.header {
    background: linear-gradient(to right, #ff6b81, #ff85a2);
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.msg {
    max-width: 70%;
    padding: 10px 12px;
    border-radius: 18px;
    font-size: 14px;
}

.me {
    align-self: flex-end;
    background: #ff6b81;
    color: white;
}

.other {
    align-self: flex-start;
    background: white;
    color: #ff4d6d;
}

.meta {
    font-size: 10px;
    opacity: 0.7;
    margin-top: 3px;
}

.time {
    font-size: 9px;
    opacity: 0.6;
    margin-top: 2px;
}

.seen {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 2px;
}

.typing {
    font-size: 12px;
    opacity: 0.7;
    padding: 5px 10px;
    color: #ff4d6d;
}

.inputArea {
    display: flex;
    padding: 10px;
    background: #ffe4ec;
}

.inputArea input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}

.inputArea button {
    margin-left: 8px;
    width: 45px;
    border-radius: 50%;
    border: none;
    background: #ff6b81;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
    <div class="card">
        <h2>💖 Enter your name</h2>
        <input id="nameInput" placeholder="Your name...">
        <button id="startBtn">Start Chat</button>
    </div>
</div>

<!-- APP -->
<div id="app" class="phone">

    <div class="header">💞</div>

    <div id="chatBox" class="chat"></div>

    <div id="typingBox" class="typing"></div>

    <div class="inputArea">
        <input id="msgInput" placeholder="Type a message...">
        <button id="sendBtn">➤</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, arrayUnion, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRD_lM2mq1yRnyEyj_2mbBZDU77oxsS3I",
  authDomain: "chat-love-86ebf.firebaseapp.com",
  projectId: "chat-love-86ebf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const login = document.getElementById("login");
const appDiv = document.getElementById("app");
const chatBox = document.getElementById("chatBox");
const typingBox = document.getElementById("typingBox");
const msgInput = document.getElementById("msgInput");

let username = "";
let listenerStarted = false;

// LOGIN
function startChat() {
    const input = document.getElementById("nameInput").value.trim();
    if (!input) return alert("Enter name 💖");

    username = input;

    login.classList.add("hidden");
    appDiv.classList.add("show");

    if (!listenerStarted) {
        listenMessages();
        listenTyping();
        listenerStarted = true;
    }
}

document.getElementById("startBtn").onclick = startChat;

// SEND MESSAGE
async function sendMessage() {
    if (!username) return;
    if (!msgInput.value) return;

    await addDoc(collection(db, "messages"), {
        name: username,
        text: msgInput.value,
        time: serverTimestamp(),
        seenBy: [username]
    });

    msgInput.value = "";
}

document.getElementById("sendBtn").onclick = sendMessage;

msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
});

// TYPING UPDATE
msgInput.addEventListener("input", async () => {
    if (!username) return;

    await setDoc(doc(db, "typing", username), {
        name: username,
        time: serverTimestamp()
    });
});

// CHAT
function listenMessages() {
    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snapshot) => {
        chatBox.innerHTML = "";

        snapshot.forEach(docSnap => {
            const m = docSnap.data();

            const wrapper = document.createElement("div");
            wrapper.classList.add("msg", m.name === username ? "me" : "other");

            const text = document.createElement("div");
            text.innerText = m.text;

            const meta = document.createElement("div");
            meta.classList.add("meta");
            meta.innerText = m.name;

            const time = document.createElement("div");
            time.classList.add("time");

            let t = m.time?.toDate ? m.time.toDate() : new Date();
            time.innerText = t.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

            const seen = document.createElement("div");
            seen.classList.add("seen");
            seen.innerText = (m.seenBy && m.seenBy.length > 1) ? "Seen ✓" : "Sent";

            wrapper.appendChild(text);
            wrapper.appendChild(meta);
            wrapper.appendChild(time);

            if (m.name === username) wrapper.appendChild(seen);

            chatBox.appendChild(wrapper);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// TYPING INDICATOR
function listenTyping() {
    onSnapshot(collection(db, "typing"), (snapshot) => {
        let typingUsers = [];

        snapshot.forEach(doc => {
            const data = doc.data();

            if (data.name !== username) {
                typingUsers.push(data.name);
            }
        });

        if (typingUsers.length > 0) {
            typingBox.innerText = typingUsers.join(", ") + " is typing...";
        } else {
            typingBox.innerText = "";
        }
    });
}
</script>

</body>
</html>
