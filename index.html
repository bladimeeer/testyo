<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Style Chat 💬</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.hidden { display: none; }

/* LOGIN */
.screen {
    text-align: center;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.card input {
    padding: 10px;
    width: 80%;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.card button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #0084ff;
    color: white;
    cursor: pointer;
}

/* APP */
.phone {
    width: 380px;
    height: 650px;
    background: white;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    overflow: hidden;
}

.header {
    background: #0084ff;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* MESSAGES */
.msg {
    max-width: 70%;
    padding: 10px 12px;
    border-radius: 18px;
    font-size: 14px;
    word-wrap: break-word;
}

.me {
    align-self: flex-end;
    background: #0084ff;
    color: white;
    border-bottom-right-radius: 5px;
}

.other {
    align-self: flex-start;
    background: #e4e6eb;
    color: black;
    border-bottom-left-radius: 5px;
}

.meta {
    font-size: 10px;
    opacity: 0.6;
    margin-top: 3px;
}

/* INPUT */
.inputArea {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
    background: #fff;
}

.inputArea input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ddd;
    outline: none;
}

.inputArea button {
    margin-left: 8px;
    width: 45px;
    border-radius: 50%;
    border: none;
    background: #0084ff;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen">
    <div class="card">
        <h2>Enter your name 💬</h2>
        <input id="nameInput" placeholder="Your name...">
        <button id="startBtn">Start Chat</button>
    </div>
</div>

<!-- APP -->
<div id="app" class="phone hidden">

    <div class="header">Messenger Chat 💙</div>

    <div id="chatBox" class="chat"></div>

    <div class="inputArea">
        <input id="msgInput" placeholder="Type a message...">
        <button id="sendBtn">➤</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRD_lM2mq1yRnyEyj_2mbBZDU77oxsS3I",
  authDomain: "chat-love-86ebf.firebaseapp.com",
  projectId: "chat-love-86ebf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const login = document.getElementById("login");
const appDiv = document.getElementById("app");
const chatBox = document.getElementById("chatBox");
const msgInput = document.getElementById("msgInput");

let username = "";

// START CHAT
function startChat() {
    username = document.getElementById("nameInput").value;
    if (!username) return;

    login.classList.add("hidden");
    appDiv.classList.remove("hidden");

    listenMessages();
}

document.getElementById("startBtn").onclick = startChat;

// SEND MESSAGE
async function sendMessage() {
    if (!msgInput.value) return;

    await addDoc(collection(db, "messages"), {
        name: username,
        text: msgInput.value,
        time: serverTimestamp()
    });

    msgInput.value = "";
}

document.getElementById("sendBtn").onclick = sendMessage;

msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
});

// REALTIME
function listenMessages() {
    const q = query(collection(db, "messages"), orderBy("time"));

    onSnapshot(q, (snapshot) => {
        chatBox.innerHTML = "";

        snapshot.forEach(doc => {
            const m = doc.data();

            const wrapper = document.createElement("div");
            wrapper.classList.add("msg", m.name === username ? "me" : "other");

            const text = document.createElement("div");
            text.innerText = m.text;

            const meta = document.createElement("div");
            meta.classList.add("meta");
            meta.innerText = m.name;

            wrapper.appendChild(text);
            wrapper.appendChild(meta);

            chatBox.appendChild(wrapper);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    });
}
</script>

</body>
</html>
